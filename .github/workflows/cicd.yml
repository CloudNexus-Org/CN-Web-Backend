name: Backend - CI/CD + DevSecOps

on:
  push:
    branches:
      - dev
      - devsecops/**
  pull_request:
    branches:
      - dev

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 📥 Checkout
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # ☕ Java Setup
      # =========================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # =========================
      # 🔨 Build JAR
      # =========================
      - name: Build JAR
        run: mvn -B clean package

      # =========================
      # 🐳 Build Docker Image
      # =========================
      - name: Build Docker Image
        run: docker build -t backend:${{ github.sha }} .

      # =========================
      # 📦 Save Image (IMPORTANT)
      # =========================
      - name: Save Docker Image
        run: docker save -o image.tar backend:${{ github.sha }}

      # =====================================================
      # 🔍 SONARCLOUD (FIXED)
      # =====================================================
      - name: SonarCloud Scan
        if: github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/heads/devsecops/')
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=${{ secrets.PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.ORG_KEY }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      # =====================================================
      # 🔐 SNYK (WORKING LIKE GITLAB)
      # =====================================================
      - name: Install Snyk
        if: startsWith(github.ref, 'refs/heads/devsecops/')
        run: npm install -g snyk

      - name: Load Docker Image
        if: startsWith(github.ref, 'refs/heads/devsecops/')
        run: docker load -i image.tar

      - name: Snyk Container Scan (FIXED)
        if: startsWith(github.ref, 'refs/heads/devsecops/')
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk container test backend:${{ github.sha }} --json > snyk-report.json || true

      - name: Format Snyk Report
        if: startsWith(github.ref, 'refs/heads/devsecops/')
        run: |
          jq -r '
            if .vulnerabilities then
              .vulnerabilities[] | {severity, packageName, version, title}
            else
              "No vulnerabilities found"
            end
          ' snyk-report.json || true

      # =====================================================
      # 🔍 TRIVY SCAN
      # =====================================================
      - name: Trivy Scan (Image TAR)
        if: startsWith(github.ref, 'refs/heads/devsecops/')
        uses: aquasecurity/trivy-action@master
        with:
          input: image.tar
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      # =====================================================
      # 🐳 PUSH IMAGE (ONLY dev)
      # =====================================================
      - name: Login DockerHub
        if: github.ref == 'refs/heads/dev'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker Image
        if: github.ref == 'refs/heads/dev'
        run: |
          docker tag backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/cloudnexus1-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cloudnexus1-backend:latest

      # =====================================================
      # 🛡️ STACKHAWK
      # =====================================================
      - name: StackHawk Scan
        if: startsWith(github.ref, 'refs/heads/devsecops/')
        uses: stackhawk/hawkscan-action@v2
        with:
          apiKey: ${{ secrets.HAWK_API_KEY }}