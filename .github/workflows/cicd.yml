name: Backend - CI/CD + DevSecOps

on:
  push:
    branches:
      - dev
      - devsecops/**
  pull_request:
    branches:
      - dev

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 📥 Checkout
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # ☕ Java Setup
      # =========================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # =========================
      # 🔨 Build
      # =========================
      - name: Build JAR
        run: mvn -B package -DskipTests --file pom.xml

      # =====================================================
      # 🐳 DOCKER BUILD & PUSH (ONLY FOR dev BRANCH)
      # =====================================================
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/dev'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push Docker Image
        if: github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cloudnexus1-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/cloudnexus1-backend:${{ github.sha }}

      # =====================================================
      # 🔍 SONARCLOUD (ONLY devsecops BRANCH)
      # =====================================================
      - name: SonarCloud Scan (Maven)
        if: startsWith(github.ref, 'refs/heads/devsecops/')
        run: mvn -B verify sonar:sonar \
          -Dsonar.projectKey=${{ secrets.PROJECT_KEY }} \
          -Dsonar.organization=${{ secrets.ORG_KEY }} \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # =====================================================
      # 🔐 SNYK (DEPENDENCY SCAN)
      # =====================================================
      - name: Snyk Dependency Scan
        if: startsWith(github.ref, 'refs/heads/devsecops/')
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # =====================================================
      # 🔐 SNYK (CONTAINER SCAN)
      # =====================================================
      - name: Snyk Container Scan
        if: startsWith(github.ref, 'refs/heads/devsecops/')
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/cloudnexus1-backend:latest

      # =====================================================
      # 🛡️ STACKHAWK (DAST)
      # =====================================================
      - name: StackHawk Scan
        if: startsWith(github.ref, 'refs/heads/devsecops/')
        uses: stackhawk/hawkscan-action@v2
        with:
          apiKey: ${{ secrets.HAWK_API_KEY }}