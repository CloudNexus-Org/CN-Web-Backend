name: Backend - CI/CD + DevSecOps

on:
  push:
    branches:
      - dev
      - devsecops/**
  pull_request:
    branches:
      - dev

jobs:
  # =========================
  # 🔨 BUILD
  # =========================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn -B clean package

      - name: Build Docker Image
        run: docker build -t backend:${{ github.sha }} .

      - name: Save Docker Image
        run: docker save -o image.tar backend:${{ github.sha }}

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  # =========================
  # 🔍 SONARQUBE
  # =========================
  sonarqube:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/heads/devsecops/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: SonarQube Scan
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=${{ secrets.PROJECT_KEY }} \
            -Dsonar.host.url=http://${{ secrets.SONAR_IP }}:9000 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true 2>&1 | tee sonarqube-report.txt || true

      - name: Upload SonarQube Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sonarqube-report
          path: sonarqube-report.txt

  # =========================
  # 🔐 SNYK
  # =========================
  snyk:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/devsecops/')
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i image.tar

      - name: Install Snyk + jq
        run: |
          npm install -g snyk
          sudo apt-get update && sudo apt-get install -y jq

      - name: Snyk Container Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk container test backend:${{ github.sha }} --json > snyk-report.json || true

      - name: Show Snyk Report
        run: |
          jq -r '
            if .vulnerabilities then
              .vulnerabilities[] | {severity, packageName, version, title}
            elif .issues then
              .issues[] | {severity, pkgName, pkgVersion, issue}
            else
              "No vulnerabilities found"
            end
          ' snyk-report.json || true

      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report
          path: snyk-report.json

  # =========================
  # 🔍 TRIVY
  # =========================
  trivy:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/devsecops/')
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Trivy Scan (Image TAR)
        uses: aquasecurity/trivy-action@master
        with:
          input: image.tar
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json

  # =========================
  # 🛡️ STACKHAWK
  # =========================
  stackhawk:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/devsecops/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: StackHawk Scan
        uses: stackhawk/hawkscan-action@v2
        with:
          apiKey: ${{ secrets.HAWK_API_KEY }}
          hawk-scan-failure-threshold: high

      - name: Upload StackHawk Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stackhawk-report
          path: .hawk/

  # =========================
  # 🐳 DOCKER PUSH
  # =========================
  docker-push:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i image.tar

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker Image
        run: |
          docker tag backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/cloudnexus1-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cloudnexus1-backend:latest
