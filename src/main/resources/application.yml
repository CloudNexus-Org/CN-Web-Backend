server:
  port: ${PORT}

spring:
  application:
    name: cn-backend
  datasource:
    # JDBC URL format for Supabase
    url: ${DB_URL:jdbc:postgresql://db.uqlyhicgvqawiiixuumy.supabase.co:5432/postgres?sslmode=require}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:CN-Web-Version0}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

# Logging level
logging:
  level:
    org.springframework.web: INFO
    com.cloudnexus.backend: DEBUG
